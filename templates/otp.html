<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رمز التحقق</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center}
.container{background:white;border-radius:20px;padding:40px;text-align:center;max-width:380px;width:90%}
.icon{font-size:50px;margin-bottom:15px}
h1{margin-bottom:12px;color:#333;font-size:22px}
p{color:#666;margin-bottom:25px;font-size:14px}
.otp-input{width:100%;padding:15px;font-size:24px;text-align:center;letter-spacing:8px;border:2px solid #e0e0e0;border-radius:10px;margin-bottom:20px}
.otp-input:focus{outline:none;border-color:#667eea}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer}
.loading{display:none;margin-top:15px;color:#666}
.loading.active{display:block}
</style>
</head>
<body>
<div class="container">
<div class="icon">📱</div>
<h1>رمز التحقق</h1>
<p>أدخل رمز OTP المرسل إلى هاتفك</p>
<input type="text" id="otp" class="otp-input" placeholder="000000" maxlength="6">
<button class="submit-btn" onclick="submitOTP()">تحقق</button>
<div class="loading" id="loading">جاري التحقق...</div>
</div>
<script>
async function submitOTP(){
const otp=document.getElementById('otp').value;
if(otp.length<4){alert('أدخل الرمز كاملاً');return;}
document.getElementById('loading').classList.add('active');
try{
const res=await fetch('/submit_otp',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({payment_id:'{{ payment_id }}',otp:otp})});
const data=await res.json();
if(data.success){window.location.href='/result/{{ payment_id }}';}
}catch(e){alert('خطأ');}
}
</script>
</body>
</html>
